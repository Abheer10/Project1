<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"  rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
    <h1>Good Afternoon, Abheer!</h1>
    <div class="header-controls">
        <div class="dropdown">
            Daily <i class="fas fa-chevron-down"></i>
        </div>
        <div class="date-picker">
        <i class="fas fa-calendar-alt"></i>
        2 April 2026
        </div>

        
    </div>

    <div class="export-btn">
        <i class="fas fa-download"></i>
        Export
    </div>
</div>
<div class="main-content">
    <div class="dashboard-grid">
    <div class="card">
        <div class="card-header">
            <h3 class="card title">Monthly Income</h3>
            <button class="card menu"><i class="fas fa-ellipsis-h"></i></button>

        </div>
        <div class="amount income-amount">₹2645.00</div>
        <div class="change">
            <i class="fas fa-arrow-up"></i>
            12% vs last month
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card title">Monthly Expenses</h3>
            <button class="card menu"><i class="fas fa-ellipsis-h"></i></button>

        </div>
        <div class="amount expense-amount">₹1495.00</div>
        <div class="change">
            <i class="fas fa-arrow-up"></i>
            12% vs last month
        </div>
    </div>

     <div class="my-card">
        <div class="card-header">
            <h3 class="card title">My Card</h3>
            <button class="card menu" style="color: rgb(70, 14, 224);"><i class="fas fa-ellipsis-h"></i></button>
        </div>
        <div style="font-size: 0.7rem; opacity: 0.8; margin-bottom: 1rem;">Lined to your primary wallet</div>

        <div class="card-chip"></div>
        <div class="card-number"><b>1234 5678 9012 3456</b></div>
        <div class="card-holder">Abheer Sinha</div>

        <div class="card-logo">
        </div class="card-logo-circle logo red"></div>
            <div class="card-logo-circle logo orange"></div>
        </div>
        
        <div class="spending-section">
            <div style="margin-bottom: 0.5rem; font-size: 0.875rem; opacity: 0.9;">Spending Limit</div>
            <div class="spending-limit">₹46545.00</div>
            <div class="spending-used">used from ₹132545.00</div>
            <div class="progress-bar"></div>
            <div class="progress-fill"></div>
        
            
        </div>
    </div>


</div>


    
    <script src="script.js"></script>
</body>
</html>
